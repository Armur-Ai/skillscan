id: SKILL-EXF-003
name: Skill script reads credential directories
severity: high
category: exfiltration
confidence: 90
message: "Reference to credential directory at line {line}: `{match}`"
remediation: |
  `~/.ssh`, `~/.aws`, `~/.kube` and friends hold long-lived credentials.
  A skill script should not read them — accept the value via an
  environment variable that the user injects on purpose instead.
match:
  regex: '(?:~|\$HOME|\$\{HOME\})/\.(?:ssh|aws|kube|gnupg|netrc|config/gcloud)\b'
files:
  - '**/*.sh'
  - '**/*.bash'
  - '**/*.zsh'
  - '**/*.py'
  - '**/*.md'
