name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/armur-ai/skillscan

jobs:
  docker:
    name: build & publish (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            short: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            short: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build & push per-platform image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.IMAGE }}:${{ matrix.short }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.short }}
          cache-to: type=gha,scope=${{ matrix.short }},mode=max

  manifest:
    name: combine multi-arch manifest
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Create multi-arch manifest for each tag
        run: |
          set -euo pipefail
          SRC_AMD=${{ env.IMAGE }}:amd64-${{ github.sha }}
          SRC_ARM=${{ env.IMAGE }}:arm64-${{ github.sha }}
          while read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "Composing $TAG from $SRC_AMD + $SRC_ARM"
            docker buildx imagetools create -t "$TAG" "$SRC_AMD" "$SRC_ARM"
          done <<< "${{ steps.meta.outputs.tags }}"
